### --- Theme Bootstrapping ---
# Ensure the symlink exists so Sway doesn't crash on first boot
exec_always [ ! -e ~/.config/sway/themes/sway_current.conf ] && ln -s ~/.config/sway/themes/sway_dark.conf ~/.config/sway/themes/sway_current.conf

# Start the Darkman daemon for sunrise/sunset switching
exec darkman run

# Load the dynamic Rosé Pine colors
include ~/.config/sway/themes/sway_current.conf

### --- UI & Typography ---
set $gui_font pango:JetBrainsMono Nerd Font 10
font $gui_font

# Disable titlebars and set default border thickness
default_border pixel 1
default_floating_border normal

### --- Layout & Compact Gaps ---
# Inner gaps: just enough to separate two terminals clearly
gaps inner 5

# Outer gaps: this is the "shadow line" between your bar and windows
gaps outer 2

# Keeps the gap active even with only one window (prevents "blending")
smart_gaps on

# Keep borders clean
smart_borders on

### --- Window Decorations (Tightened) ---
# We use a slightly more vibrant border for the focused window to 
# make it pop now that the gaps are smaller.
# target                 border  bg      text    indicator child_border
client.focused           $iris   $base   $text   $rose     $iris
client.focused_inactive  $muted  $surface $subtle $muted    $muted
client.unfocused         $muted  $base   $muted  $base     $base

### --- Status Bar (Refined Separation) ---
bar {
    position top
    font $gui_font
    status_command ~/.config/sway/scripts/status.sh
    pango_markup enabled

    # Minimize vertical height since gaps are smaller
    tray_padding 2

    colors {
        # Use $overlay for the background instead of $surface.
        # $overlay is slightly darker/deeper, which creates a 
        # stronger "anchor" at the top of the screen.
        background         $overlay
        statusline         $text
        separator          $iris

        #                  border    bg        text
        focused_workspace  $iris     $iris     $base
        active_workspace   $surface  $surface  $text
        inactive_workspace $overlay  $overlay  $muted
    }
}
